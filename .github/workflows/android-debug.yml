name: Android Debug Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Source ref (tag/branch/SHA) to build. Empty = default branch.
        required: false
        default: ""

permissions:
  contents: write # for the pre-release

defaults:
  run:
    working-directory: app

jobs:
  build_debug:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout app source (private repo)
        uses: actions/checkout@v4
        with:
          repository: andronasef/memelord-rn
          ref: ${{ inputs.ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 🟢 Setup Node (Gradle shells out to node)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 📝 Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > google-services.json

      - name: 🏗️ Expo prebuild (Android)
        run: bunx expo prebuild --platform android --clean

      - name: 🐛 Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: 🏷️ Read app version
        id: version
        run: echo "version=$(node -p "require('./app.json').expo?.version || require('./app.json').version")" >> "$GITHUB_OUTPUT"

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: 🏷️ Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Debug v${{ steps.version.outputs.version }} (#${{ github.run_number }})
          prerelease: true
          body: |
            🐛 Debug build (unsigned/debug-signed, not for Play).
            - Version: ${{ steps.version.outputs.version }}
          files: app/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
