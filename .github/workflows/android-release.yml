name: Android Release (Google Play draft)

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout app source (private repo)
        uses: actions/checkout@v4
        with:
          repository: andronasef/memelord-rn
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 🟢 Setup Node (Gradle shells out to node)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔐 Write release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > key.jks

      - name: 📝 Write .signing.env
        run: |
          echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}" > .signing.env
          echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> .signing.env
          echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> .signing.env

      - name: 📝 Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > google-services.json

      - name: 🏗️ Expo prebuild (Android)
        run: bunx expo prebuild --platform android --clean

      - name: 📦 Build release AAB
        run: cd android && ./gradlew bundleRelease

      - name: 🔑 Write Google Play service account key
        run: echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > play-service-account.json

      - name: 🚀 Upload to Google Play (draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: app/play-service-account.json
          packageName: com.increase.mememaker
          releaseFiles: app/android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: draft
